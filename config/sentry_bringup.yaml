  executable: tree_1
  node_name: cod_behavior
  params_files:
    red: package://cod_behavior/launch/cod_pose_red.yaml
    blue: package://cod_behavior/launch/cod_pose_blue.yaml
  cod_bt_path: package://cod_behavior/cod_bt/nav_tree.xml
