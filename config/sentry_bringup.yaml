livox:
  dual:
    node_name: mid360_dual_driver
    user_config_path: /home/wele/ros_ws/src/Sentry-Nav/sentry_nav_bringup/config/mid_mix_params.json
    xfer_format: 0
    multi_topic: 1
    data_src: 0
    publish_freq: 10.0
    output_type: 0
    frame_id: livox_frame

slam:
  package: slam_bringup
  mapping_launch: slam_mapping.py
  mapping_params_file: package://slam_bringup/config/slam_mapping.yaml
  relocalization_launch: slam_relocalization.py
  relocalization_params_files:
    red: package://slam_bringup/config/slam_relocalization_red.yaml
    blue: package://slam_bringup/config/slam_relocalization_blue.yaml

navigation:
